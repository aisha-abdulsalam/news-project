#composed file
services:
  - type: web
    name: news-project
    plan: free 
    runtime: python-3.14
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py migrate && gunicorn project.wsgi:application
    envVars:
      - key: DEBUG
        value: 'False'
      - key: PYTHONUNBUFFERED
        value: '1'
      - key: DATABASE_URL
        fromDatabase:
          name: newsproject_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true